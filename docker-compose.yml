# docker-compose.yml
services:

  # ── Nginx load balancer ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_gateway_1
      - api_gateway_2
      - inventory_1
      - inventory_2
      - booking_1
      - booking_2
    networks:
      - ticket-net

  # ── API Gateway (x2) ───────────────────────────────────────
  api_gateway_1:
    build: ./api-gateway
    environment:
      - INVENTORY_URL=http://nginx
      - BOOKING_URL=http://nginx
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - ticket-net

  api_gateway_2:
    build: ./api-gateway
    environment:
      - INVENTORY_URL=http://nginx
      - BOOKING_URL=http://nginx
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - ticket-net

  # ── Inventory service (x2) ──────────────────────────────────
  inventory_1:
    build: ./inventory-service
    environment:
      - DB_DSN=${INVENTORY_DB_DSN}
    networks:
      - ticket-net

  inventory_2:
    build: ./inventory-service
    environment:
      - DB_DSN=${INVENTORY_DB_DSN}
    networks:
      - ticket-net

  # ── Booking service (x2) ────────────────────────────────────
  booking_1:
    build: ./booking-service
    environment:
      - DB_DSN=${BOOKING_DB_DSN}
    networks:
      - ticket-net

  booking_2:
    build: ./booking-service
    environment:
      - DB_DSN=${BOOKING_DB_DSN}
    networks:
      - ticket-net

networks:
  ticket-net:
    driver: bridge