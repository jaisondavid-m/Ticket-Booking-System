version: "3.9"

services:

  # ── Nginx load balancer ──────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api_gateway_1
      - api_gateway_2
      - inventory_1
      - inventory_2
      - booking_1
      - booking_2
    networks:
      - ticket-net

  # ── API Gateway (x2) ───────────────────────────────────────
  api_gateway_1:
    build: ./api-gateway
    environment:
      - INVENTORY_URL=http://nginx
      - BOOKING_URL=http://nginx
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - ticket-net

  api_gateway_2:
    build: ./api-gateway
    environment:
      - INVENTORY_URL=http://nginx
      - BOOKING_URL=http://nginx
      - JWT_SECRET=${JWT_SECRET}
    networks:
      - ticket-net


  # ── Inventory service (x2) ──────────────────────────────────
  inventory_1:
    build: ./inventory-service
    environment:
      - DB_DSN=${INVENTORY_DB_DSN}
    networks:
      - ticket-net

  inventory_2:
    build: ./inventory-service
    environment:
      - DB_DSN=${INVENTORY_DB_DSN}
    networks:
      - ticket-net


  # ── Booking service (x2) ────────────────────────────────────
  booking_1:
    build: ./booking-service
    environment:
      - DB_DSN=${BOOKING_DB_DSN}
    networks:
      - ticket-net

  booking_2:
    build: ./booking-service
    environment:
      - DB_DSN=${BOOKING_DB_DSN}
    networks:
      - ticket-net


  # ── Redis Cluster ───────────────────────────────────────────
  redis1:
    image: redis:7-alpine
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - ticket-net

  redis2:
    image: redis:7-alpine
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    networks:
      - ticket-net

  redis3:
    image: redis:7-alpine
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --appendonly yes
      --maxmemory 2gb
      --maxmemory-policy allkeys-lru
    ports:
      - "6381:6379"
    networks:
      - ticket-net


  redis-cluster-init:
    image: redis:7-alpine
    depends_on:
      - redis1
      - redis2
      - redis3
    command: >
      sh -c "sleep 5 &&
      redis-cli --cluster create
      redis1:6379 redis2:6379 redis3:6379
      --cluster-replicas 0 --cluster-yes"
    restart: "no"
    networks:
      - ticket-net


networks:
  ticket-net:
    driver: bridge