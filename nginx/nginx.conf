# nginx/nginx.conf
events {
    worker_connections 1024; //one worker handles 1024 request
}

http {

    upstream gateway_pool {
        least_conn;
        server gateway_1:8080;
        server gateway_2:8080;
    }

    upstream inventory_pool {
        least_conn;
        server inventory_1:8081;
        server inventory_2:8081;
    }

    upstream booking_pool {
        least_conn;
        server booking_1:8082;
        server booking_2:8082;
    }

    server {
        listen 80;

        # Gateway — client-facing entry point
        location /api/book {
            proxy_pass         http://gateway_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream     error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout   3s;
            proxy_read_timeout      10s;
        }

        # Inventory — reserve endpoint
        location /api/reserve {
            proxy_pass         http://inventory_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream     error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout   3s;
            proxy_read_timeout      10s;
        }

        # Inventory — release (compensating transaction)
        location /api/release {
            proxy_pass         http://inventory_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;

            proxy_next_upstream     error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout   3s;
            proxy_read_timeout      10s;
        }

        # Booking
        location /api/bookings {
            proxy_pass         http://booking_pool;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_next_upstream     error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout   3s;
            proxy_read_timeout      10s;
        }

        # Nginx health check — for your monitoring / uptime tools
        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}