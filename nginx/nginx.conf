events {
    worker_connections 4096;    # increased for 100k RPS
    multi_accept on;
    use epoll;
}

http {
    keepalive_timeout 65;
    keepalive_requests 1000;

    upstream api_gateway_pool {
        least_conn;
        server api_gateway_1:8080;
        server api_gateway_2:8080;
        keepalive 128;           # persistent connections to gateway
    }

    server {
        listen 80;

        location /api/ {
            proxy_pass             http://api_gateway_pool;
            proxy_http_version     1.1;
            proxy_set_header       Connection "";
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_next_upstream    error timeout http_500 http_502 http_503;
            proxy_next_upstream_tries 2;
            proxy_connect_timeout  2s;
            proxy_read_timeout     5s;
        }

        location /health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}